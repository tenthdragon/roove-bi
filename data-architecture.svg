  <text x="668" y="382" text-anchor="middle" font-size="7" fill="#0e7490">• Webhook</text>
  <text x="668" y="394" text-anchor="middle" font-size="7" fill="#0e7490">• ScaleV Sync</text>
  <text x="668" y="406" text-anchor="middle" font-size="7" fill="#0e7490">• Ads Sync</text>
  <text x="668" y="418" text-anchor="middle" font-size="7" fill="#0e7490">• Manual button</text>
  <text x="668" y="435" text-anchor="middle" font-size="7" font-weight="600" fill="#155e75">REFRESH</text>
  <text x="668" y="445" text-anchor="middle" font-size="7" font-weight="600" fill="#155e75">CONCURRENTLY</text>

