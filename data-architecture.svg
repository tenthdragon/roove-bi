  <text x="625" y="113" text-anchor="middle" font-size="8" fill="#a16207">Financial (monthly)</text>

  <!-- Removed label -->
  <rect x="740" y="82" width="150" height="38" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3"/>
