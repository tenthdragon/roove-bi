  <text x="300" y="366" text-anchor="middle" font-size="7" fill="#15803d">total_ads_spend</text>

  <!-- MV3 -->
  <rect x="40" y="400" width="250" height="55" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
